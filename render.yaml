services:
  - type: web
    name: monad-agent-vault-api
    runtime: node
    repo: https://github.com/humarkx/monad-agent-vault-demo
    branch: main
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @gridplus-monad-agent-vault/api build
    startCommand: corepack pnpm --filter @gridplus-monad-agent-vault/api start
    healthCheckPath: /health
    disk:
      name: monad-agent-vault-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: monad-agent-vault-dapp
    runtime: static
    repo: https://github.com/humarkx/monad-agent-vault-demo
    branch: main
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @gridplus-monad-agent-vault/dapp build
    staticPublishPath: apps/dapp/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
